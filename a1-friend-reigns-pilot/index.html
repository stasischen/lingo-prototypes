<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>A1 Friend + Reigns Pilot</title>
  <style>
    :root {
      --bg: #f7f4ee;
      --ink: #1d2625;
      --muted: #64706d;
      --line: #d8d0c4;
      --paper: #fffdf8;
      --friend: #0f6b68;
      --friend-soft: #dff1ee;
      --accent: #9a5a2f;
      --accent-soft: #f5dfc8;
      --good: #17704b;
      --bad-soft: #f7e4cf;
      --shadow: 0 18px 40px rgba(57, 45, 32, .14);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        linear-gradient(120deg, rgba(15, 107, 104, .06), transparent 34%),
        linear-gradient(240deg, rgba(154, 90, 47, .08), transparent 38%),
        var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }
    button, input { font: inherit; }
    button { border: 0; cursor: pointer; }
    .app {
      width: min(100%, 440px);
      min-height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: rgba(255, 253, 248, .72);
      border-left: 1px solid rgba(216, 208, 196, .7);
      border-right: 1px solid rgba(216, 208, 196, .7);
    }
    .top {
      position: sticky;
      top: 0;
      z-index: 5;
      padding: max(14px, env(safe-area-inset-top)) 18px 12px;
      background: rgba(247, 244, 238, .94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(216, 208, 196, .8);
    }
    .kicker {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 800;
    }
    h1 { margin: 4px 0 0; font-size: 20px; letter-spacing: 0; line-height: 1.2; }
    .progress { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; margin-top: 12px; }
    .dot { height: 5px; border-radius: 999px; background: #ddd3c6; }
    .dot.active, .dot.done { background: var(--friend); }
    .scenario-tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin-top: 12px;
    }
    .scenario-tab {
      min-height: 34px;
      padding: 6px 8px;
      border-radius: 8px;
      background: rgba(255,253,248,.9);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
      overflow-wrap: anywhere;
    }
    .scenario-tab.active {
      background: var(--friend-soft);
      border-color: #b9ddd7;
      color: var(--friend);
    }
    main { flex: 1; padding: 18px 18px 132px; display: flex; flex-direction: column; gap: 14px; }
    .screen { display: none; animation: rise .18s ease-out; }
    .screen.active { display: block; }
    @keyframes rise { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .scene {
      min-height: 170px;
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(20, 81, 78, .08), rgba(154, 90, 47, .08)), var(--paper);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 18px;
      position: relative;
      overflow: hidden;
    }
    .scene::before {
      content: "";
      position: absolute;
      inset: auto 18px 22px;
      height: 46px;
      border: 1px solid rgba(29, 38, 37, .18);
      border-radius: 6px;
      background: rgba(255, 253, 248, .56);
    }
    .scene::after {
      content: "";
      position: absolute;
      right: 36px;
      bottom: 68px;
      width: 62px;
      height: 78px;
      border-radius: 30px 30px 8px 8px;
      background: linear-gradient(#205b57, #103d3b);
      box-shadow: -86px 18px 0 -15px #ad7a4d;
      opacity: .88;
    }
    .scene-title { position: relative; z-index: 1; font-size: 28px; line-height: 1.08; font-weight: 850; max-width: 250px; }
    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 10px 24px rgba(57, 45, 32, .08);
      padding: 16px;
    }
    .friend-line { display: grid; grid-template-columns: 36px 1fr; gap: 10px; align-items: start; }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%; background: var(--friend); color: white;
      display: grid; place-items: center; font-weight: 900; box-shadow: inset 0 -5px 0 rgba(0,0,0,.12);
    }
    .friend-copy { color: var(--ink); line-height: 1.55; font-size: 16px; }
    .meta { color: var(--muted); font-size: 13px; line-height: 1.45; margin-top: 8px; }
    .dialogue { display: flex; flex-direction: column; gap: 12px; }
    .bubble { max-width: 86%; padding: 12px; border-radius: 8px; border: 1px solid var(--line); background: #fff; }
    .bubble.staff { align-self: flex-start; }
    .bubble.learner { align-self: flex-end; background: var(--friend-soft); border-color: #b9ddd7; }
    .role { font-size: 12px; color: var(--muted); font-weight: 800; margin-bottom: 5px; }
    .ko { font-size: 22px; line-height: 1.3; font-weight: 760; letter-spacing: 0; }
    .zh { margin-top: 6px; color: var(--muted); font-size: 14px; }
    .spotlight { text-align: center; padding: 22px 14px; background: #fff; border: 1px solid var(--line); border-radius: var(--radius); }
    .spotlight .ko { font-size: 28px; }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
    .chip { padding: 10px 12px; background: var(--accent-soft); border: 1px solid #e0bd98; border-radius: 999px; color: #58331c; font-weight: 780; }
    .sheet { border-left: 4px solid var(--accent); }
    .sheet h2, .practice h2, .reigns h2 { margin: 0 0 10px; font-size: 18px; letter-spacing: 0; }
    .row { display: flex; justify-content: space-between; gap: 12px; padding: 9px 0; border-top: 1px solid rgba(216, 208, 196, .72); }
    .row:first-of-type { border-top: 0; }
    .row b { min-width: 58px; }
    .choice-list { display: grid; gap: 10px; margin-top: 12px; }
    .choice { text-align: left; padding: 13px; border-radius: var(--radius); background: #fff; border: 1px solid var(--line); color: var(--ink); min-height: 56px; }
    .choice.selected.good { border-color: rgba(23,112,75,.45); background: #e4f3ec; }
    .choice.selected.warn { border-color: rgba(155,101,30,.45); background: var(--bad-soft); }
    .feedback { display: none; margin-top: 12px; padding: 12px; border-radius: var(--radius); background: var(--friend-soft); color: var(--ink); line-height: 1.45; border: 1px solid #b9ddd7; }
    .feedback.show { display: block; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
    .btn { min-height: 44px; border-radius: 8px; padding: 0 14px; background: var(--ink); color: white; font-weight: 800; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn.secondary { background: #ede4d8; color: var(--ink); border: 1px solid var(--line); }
    .btn.ghost { background: transparent; color: var(--friend); border: 1px solid #b9ddd7; }
    .stage-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 9px; border-radius: 999px; background: var(--friend-soft); color: var(--friend); font-size: 12px; font-weight: 850; margin-bottom: 10px; }
    .typebox { width: 100%; min-height: 48px; border-radius: 8px; border: 1px solid var(--line); padding: 12px; background: #fff; color: var(--ink); margin-top: 10px; }
    .reigns-board { display: grid; gap: 12px; }
    .chat-shell {
      height: clamp(430px, calc(100vh - 246px), 620px);
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      gap: 10px;
    }
    .chat-status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      padding: 0 2px;
    }
    .chat-tools { display: flex; align-items: center; gap: 7px; }
    .toggle {
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,253,248,.9);
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }
    .toggle.active {
      background: var(--friend-soft);
      border-color: #b9ddd7;
      color: var(--friend);
    }
    .message-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
      padding: 8px 2px 12px;
      overflow-y: auto;
    }
    .message {
      max-width: 84%;
      padding: 11px 12px;
      border-radius: 18px;
      border: 1px solid rgba(216, 208, 196, .82);
      background: #fff;
      box-shadow: 0 8px 18px rgba(57, 45, 32, .07);
      overflow-wrap: anywhere;
    }
    .message.staff { align-self: flex-start; border-bottom-left-radius: 6px; }
    .message.learner {
      align-self: flex-end;
      border-bottom-right-radius: 6px;
      background: var(--friend);
      border-color: var(--friend);
      color: white;
    }
    .message.friend {
      align-self: center;
      width: min(100%, 320px);
      max-width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      background: var(--friend-soft);
      border-color: #b9ddd7;
      color: var(--ink);
      box-shadow: none;
    }
    .message .role { margin-bottom: 4px; }
    .message.learner .role { color: rgba(255,255,255,.74); }
    .message .ko { font-size: 19px; }
    .message.learner .ko { color: white; }
    .message.friend .role { display: none; }
    .message.friend .ko { font-size: 13px; line-height: 1.35; font-weight: 650; }
    .message .zh { font-size: 13px; }
    .message.learner .zh { color: rgba(255,255,255,.8); }
    .formula-inline {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin-top: 8px;
    }
    .formula-chip {
      min-height: 42px;
      padding: 6px;
      border-radius: 8px;
      background: rgba(255,253,248,.86);
      border: 1px solid #b9ddd7;
      color: var(--ink);
      font-size: 12px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }
    .formula-chip span { display: block; margin-top: 2px; color: var(--muted); font-weight: 700; }
    .message-actions { margin-top: 8px; }
    .speak-link {
      min-height: 32px;
      padding: 0 9px;
      border-radius: 999px;
      background: #ede4d8;
      color: var(--ink);
      font-size: 12px;
      font-weight: 800;
    }
    .quick-replies {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 16px 16px 8px 8px;
      background: rgba(255,253,248,.92);
      box-shadow: 0 -8px 20px rgba(57, 45, 32, .08);
    }
    .quick-replies.is-hidden { display: none; }
    .quick-replies .choice {
      min-height: 46px;
      border-radius: 8px;
      padding: 10px 14px;
      box-shadow: 0 4px 12px rgba(57,45,32,.06);
      overflow-wrap: anywhere;
    }
    .choice-ko { display: block; }
    .choice-zh { display: block; margin-top: 3px; color: var(--muted); font-size: 12px; }
    .typing-hint {
      display: none;
      align-self: start;
      width: fit-content;
      max-width: 92%;
      padding: 9px 11px;
      border-radius: 14px;
      background: var(--friend-soft);
      border: 1px solid #b9ddd7;
      color: var(--ink);
      font-size: 14px;
      line-height: 1.4;
    }
    .typing-hint.show { display: block; }
    .hud { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat { background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 9px; font-size: 12px; color: var(--muted); }
    .stat b { display: block; margin-top: 3px; color: var(--ink); font-size: 16px; }
    .event-card {
      position: relative; padding: 16px; min-height: 190px; background: linear-gradient(180deg, #fffdf8, #f8efe4);
      border: 2px solid #cab99f; border-radius: 8px; box-shadow: var(--shadow);
    }
    .event-card::before { content: ""; position: absolute; inset: 10px; border: 1px solid rgba(154,90,47,.25); border-radius: 5px; pointer-events: none; }
    .event-label { font-size: 12px; color: var(--accent); font-weight: 900; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; }
    .npc { margin-top: 14px; padding: 12px; border-radius: 8px; background: rgba(15,107,104,.08); }
    .mini-thread { display: grid; gap: 8px; margin-top: 12px; }
    .mini-turn { padding: 9px 10px; border-radius: 8px; border: 1px solid rgba(216, 208, 196, .8); background: rgba(255,253,248,.72); font-size: 14px; line-height: 1.35; }
    .mini-turn b { display: block; font-size: 12px; color: var(--muted); margin-bottom: 3px; }
    .followup { display: none; }
    .followup.show { display: grid; }
    .listen-only { border-color: #c8d7d4; background: #f3faf8; }
    .formula-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
    .formula-card { min-height: 78px; padding: 10px; border-radius: 8px; border: 1px solid var(--line); background: #fff; text-align: left; }
    .formula-card b { display: block; font-size: 20px; line-height: 1.2; }
    .hand { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .transcript { display: grid; gap: 8px; }
    .transcript .mini-turn { background: #fff; }
    .transcript .bubble { max-width: 100%; width: 100%; box-shadow: none; }
    .transcript .ko { font-size: 18px; }
    .round-label { color: var(--muted); font-size: 13px; font-weight: 800; margin-bottom: 8px; }
    .play-slot { min-height: 52px; border: 1px dashed #b89977; border-radius: 8px; display: grid; place-items: center; color: var(--muted); background: rgba(255,253,248,.74); padding: 10px; text-align: center; }
    .wrap-list { display: grid; gap: 9px; margin: 12px 0 0; }
    .wrap-item { padding: 10px; border-radius: 8px; background: #fff; border: 1px solid var(--line); }
    .friend-bar {
      position: fixed; left: 50%; bottom: 0; transform: translateX(-50%); width: min(100%, 440px);
      padding: 10px 14px max(10px, env(safe-area-inset-bottom)); background: rgba(255,253,248,.96);
      border-top: 1px solid var(--line); display: grid; grid-template-columns: 34px 1fr auto; gap: 10px;
      align-items: center; z-index: 10; box-shadow: 0 -12px 26px rgba(57,45,32,.10);
    }
    .friend-bar .avatar { width: 34px; height: 34px; font-size: 13px; }
    .bar-text { font-size: 14px; line-height: 1.35; color: var(--ink); }
    .next { min-width: 58px; height: 40px; border-radius: 8px; background: var(--friend); color: white; font-weight: 850; }
    .next:disabled { opacity: .45; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="kicker">A1 Friend Pilot</div>
      <h1>飯店預約情境</h1>
      <div class="progress" aria-label="flow progress">
        <div class="dot active"></div><div class="dot"></div>
      </div>
      <div class="scenario-tabs" id="scenarioTabs" aria-label="scenario selector"></div>
    </header>
    <main>
      <section class="screen active" data-title="櫃台對話" data-friend="到櫃台了。聽聽看他說什麼，挑一句回他。">
        <div class="chat-shell">
          <div class="chat-status">
            <span id="settingLabel">飯店櫃台</span>
            <div class="chat-tools">
              <button class="toggle" type="button" id="translationToggle" aria-pressed="false">翻譯</button>
              <button class="toggle" type="button" id="hintToggle" aria-pressed="false">提示</button>
              <button class="toggle active" type="button" id="audioToggle" aria-pressed="true">聲音</button>
              <span id="roundProgress">1 / 4</span>
            </div>
          </div>
          <div class="message-list" id="transcriptList" aria-live="polite"></div>
          <div class="typing-hint" id="dialogueFeedback"></div>
          <div class="quick-replies" id="responseHand"></div>
        </div>
      </section>
      <section class="screen" data-title="Wrap" data-friend="你剛剛走完一段對話。">
        <div class="card"><h2 id="wrapTitle">今天這段對話</h2><div class="wrap-list" id="wrapList"></div><div class="controls"><button class="btn" type="button" id="restart">再走一次</button></div></div>
      </section>
    </main>
    <div class="friend-bar" aria-live="polite"><div class="avatar">F</div><div class="bar-text" id="friendText">到櫃台了。聽聽看他說什麼，挑一句回他。</div><button class="next" type="button" id="nextBtn">繼續</button></div>
  </div>
  <script>
    const screens = Array.from(document.querySelectorAll('.screen'));
    const dots = Array.from(document.querySelectorAll('.dot'));
    const nextBtn = document.getElementById('nextBtn');
    const friendText = document.getElementById('friendText');
    const title = document.querySelector('h1');
    let index = 0;
    let roundIndex = 0;
    let selectedResponse = null;
    let roundCommitted = false;
    let dialogueComplete = false;
    let showTranslations = false;
    let showHints = false;
    let autoSpeakStaff = true;
    let audioUnlocked = false;
    let pendingStaffSpeak = null;
    let visibleChoices = [];
    let scenarioManifest = null;
    let currentScenarioId = null;
    let scenarioPack = null;
    let rounds = [];
    const transcript = [];
    let missesByRound = [];
    function normalize(text) { return text.normalize('NFC').replace(/[.,!?，。！？\s]/g, '').trim(); }
    function supportText() { return scenarioPack && scenarioPack.support_text ? scenarioPack.support_text : '聽聽看對方說什麼，挑一句回他。'; }
    function npcLabel() { return scenarioPack && scenarioPack.roles && scenarioPack.roles.npc ? scenarioPack.roles.npc.label : '對方'; }
    function learnerLabel() { return scenarioPack && scenarioPack.roles && scenarioPack.roles.learner ? scenarioPack.roles.learner.label : '你'; }
    function targetLangCode() {
      const map = { ko: 'ko-KR', ja: 'ja-JP', en: 'en-US', th: 'th-TH' };
      return map[scenarioPack && scenarioPack.language] || 'ko-KR';
    }
    function buildRounds(pack) {
      return pack.turns.map((turn) => {
        const correctId = turn.reply_set.correct;
        return {
          id: turn.turn_id,
          act: turn.act,
          learningRole: turn.learning_role,
          staffKo: turn.surface,
          staffZh: turn.translation,
          staffSpeak: turn.speak || turn.surface,
          hint: turn.friend && turn.friend.hint ? turn.friend.hint : supportText(),
          inlineExplain: turn.inline_explain || null,
          choices: turn.reply_set.choices.map((choice) => ({
            id: choice.id,
            text: choice.surface,
            zh: choice.translation,
            speak: choice.speak || choice.surface,
            good: choice.id === correctId,
            feedback: choice.feedback,
            learningRole: choice.learning_role || null,
            contrastType: choice.contrast_type || null
          })),
          closing: turn.closing ? {
            ko: turn.closing.surface,
            zh: turn.closing.translation,
            speak: turn.closing.speak || turn.closing.surface
          } : null
        };
      });
    }
    function shuffle(items) {
      const shuffled = [...items];
      for (let i = shuffled.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }
    function estimateSpeechDelayMs(text) {
      const length = Array.from(text || '').length;
      return Math.min(3200, Math.max(900, length * 140));
    }
    function speakKo(text, rate = 0.88, options = {}) {
      if (!('speechSynthesis' in window)) {
        if (!options.silent) alert('這個瀏覽器不支援內建發音。');
        return false;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = targetLangCode();
      utterance.rate = rate;
      utterance.pitch = 1;
      const voices = window.speechSynthesis.getVoices();
      const targetPrefix = targetLangCode().slice(0, 2).toLowerCase();
      const koVoice = voices.find((voice) => voice.lang && voice.lang.toLowerCase().startsWith(targetPrefix));
      if (koVoice) utterance.voice = koVoice;
      window.speechSynthesis.speak(utterance);
      return true;
    }
    function unlockAudio() {
      audioUnlocked = true;
      if (autoSpeakStaff && pendingStaffSpeak) {
        speakKo(pendingStaffSpeak, 0.88, { silent: true });
        pendingStaffSpeak = null;
      }
    }
    function autoPlayStaff(text) {
      if (!autoSpeakStaff || !text) return;
      pendingStaffSpeak = text;
      if (audioUnlocked) {
        speakKo(text, 0.88, { silent: true });
        pendingStaffSpeak = null;
      } else {
        friendText.textContent = '點「聲音」或任一處，就能聽職員念出來。';
      }
    }
    function renderDialogueRound() {
      const round = rounds[roundIndex];
      selectedResponse = null;
      roundCommitted = false;
      document.getElementById('roundProgress').textContent = `${roundIndex + 1} / ${rounds.length}`;
      let addedStaff = false;
      if (!transcript.some((turn) => turn.round === roundIndex && turn.kind === 'staff')) {
        transcript.push({ round: roundIndex, kind: 'staff', role: npcLabel(), ko: round.staffKo, zh: round.staffZh, speak: round.staffSpeak || round.staffKo });
        addedStaff = true;
        if (round.inlineExplain) {
          transcript.push({
            round: roundIndex,
            kind: 'friend',
            role: 'Friend',
            ko: round.inlineExplain.explain || round.inlineExplain.title,
            formula: round.inlineExplain
          });
        }
      }
      friendText.textContent = showHints ? round.hint : supportText();
      const feedback = document.getElementById('dialogueFeedback');
      if (!feedback.dataset.keep) {
        feedback.textContent = '';
        feedback.classList.remove('show');
      }
      feedback.dataset.keep = '';
      const hand = document.getElementById('responseHand');
      visibleChoices = shuffle(round.choices);
      renderChoices();
      renderTranscript();
      updateNextButton();
      if (addedStaff) autoPlayStaff(round.staffSpeak || round.staffKo);
    }
    function renderChoices() {
      const hand = document.getElementById('responseHand');
      hand.classList.remove('is-hidden');
      hand.innerHTML = '';
      visibleChoices.forEach((choice) => {
        const button = document.createElement('button');
        button.className = 'choice';
        button.type = 'button';
        button.innerHTML = `<span class="choice-ko">${choice.text}</span>${showTranslations && choice.zh ? `<span class="choice-zh">${choice.zh}</span>` : ''}`;
        button.addEventListener('click', () => {
          if (roundCommitted) return;
          Array.from(hand.children).forEach((child) => child.classList.remove('selected', 'good', 'warn'));
          button.classList.add('selected', choice.good ? 'good' : 'warn');
          selectedResponse = choice;
          unlockAudio();
          const spokenText = choice.speak || choice.text;
          const didSpeak = speakKo(spokenText);
          sendSelectedReply(didSpeak ? estimateSpeechDelayMs(spokenText) : 0);
        });
        hand.appendChild(button);
      });
    }
    function renderTranscript() {
      const list = document.getElementById('transcriptList');
      if (!list) return;
      if (!transcript.length) {
        list.innerHTML = `<div class="message friend"><div class="ko">${supportText()}</div></div>`;
        return;
      }
      list.innerHTML = transcript.map((turn) => {
        const roleClass = turn.kind || (turn.role === learnerLabel() ? 'learner' : (turn.role === 'Friend' ? 'friend' : 'staff'));
        const zh = showTranslations && turn.zh ? `<div class="zh">${turn.zh}</div>` : '';
        const action = turn.speak ? `<div class="message-actions"><button class="speak-link" type="button" data-speak="${turn.speak}">發音</button></div>` : '';
        const formula = turn.formula ? `<div class="formula-inline">${turn.formula.items.map((item) => `<button class="formula-chip" type="button" data-speak="${item.speak}">${item.surface}<span>${item.translation}</span></button>`).join('')}</div>` : '';
        const role = turn.role === 'Friend' ? '' : `<div class="role">${turn.role}</div>`;
        return `<div class="message ${roleClass}">${role}<div class="ko">${turn.ko}</div>${zh}${formula}${action}</div>`;
      }).join('');
      list.scrollTop = list.scrollHeight;
    }
    function resetDialogue() {
      roundIndex = 0;
      dialogueComplete = false;
      transcript.length = 0;
      missesByRound = Array(rounds.length).fill(0);
      visibleChoices = [];
      document.getElementById('dialogueFeedback').dataset.keep = '';
      document.getElementById('responseHand').classList.remove('is-hidden');
      renderDialogueRound();
    }
    function updateNextButton() {
      const onDialogue = screens[index] && screens[index].dataset.title === '櫃台對話';
      if (onDialogue && !dialogueComplete) {
        nextBtn.disabled = true;
        nextBtn.textContent = '對話中';
        return;
      }
      nextBtn.disabled = false;
      nextBtn.textContent = index === screens.length - 1 ? '重來' : (onDialogue ? '整理' : '繼續');
    }
    function show(i) {
      index = Math.max(0, Math.min(i, screens.length - 1));
      screens.forEach((screen, idx) => screen.classList.toggle('active', idx === index));
      dots.forEach((dot, idx) => { dot.classList.toggle('active', idx === index); dot.classList.toggle('done', idx < index); });
      const screen = screens[index];
      title.textContent = screen.dataset.title === 'Wrap' ? (scenarioPack && scenarioPack.title ? scenarioPack.title : 'A1 Friend Pilot') : (scenarioPack && scenarioPack.title ? scenarioPack.title : 'A1 Friend Pilot');
      if (screen.dataset.title === '櫃台對話') {
        friendText.textContent = showHints && rounds[roundIndex] ? rounds[roundIndex].hint : supportText();
      } else {
        friendText.textContent = screen.dataset.friend || '';
      }
      if (screen.dataset.title === '櫃台對話' && transcript.length === 0 && !dialogueComplete) renderDialogueRound();
      updateNextButton();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    nextBtn.addEventListener('click', () => {
      if (nextBtn.disabled) return;
      if (index === screens.length - 1) {
        resetDialogue();
        show(0);
      } else {
        show(index + 1);
      }
    });
    document.querySelectorAll('.speak').forEach((button) => {
      button.addEventListener('click', () => {
        unlockAudio();
        speakKo(button.dataset.speak || button.textContent);
      });
    });
    document.getElementById('transcriptList').addEventListener('click', (event) => {
      const button = event.target.closest('.speak-link, .formula-chip');
      if (!button) return;
      unlockAudio();
      speakKo(button.dataset.speak || button.textContent);
    });
    function updateToggle(button, active) {
      button.classList.toggle('active', active);
      button.setAttribute('aria-pressed', String(active));
    }
    function setTranslations(active) {
      showTranslations = active;
      updateToggle(document.getElementById('translationToggle'), showTranslations);
      renderTranscript();
      if (screens[index] && screens[index].dataset.title === '櫃台對話') renderChoices();
    }
    function setHints(active) {
      showHints = active;
      updateToggle(document.getElementById('hintToggle'), showHints);
      if (screens[index] && screens[index].dataset.title === '櫃台對話') {
        const round = rounds[roundIndex];
        friendText.textContent = showHints && round ? round.hint : supportText();
      }
    }
    document.getElementById('translationToggle').addEventListener('click', () => {
      setTranslations(!showTranslations);
    });
    document.getElementById('hintToggle').addEventListener('click', () => {
      setHints(!showHints);
    });
    document.getElementById('audioToggle').addEventListener('click', () => {
      if (!audioUnlocked) {
        unlockAudio();
        updateToggle(document.getElementById('audioToggle'), autoSpeakStaff);
        return;
      }
      autoSpeakStaff = !autoSpeakStaff;
      updateToggle(document.getElementById('audioToggle'), autoSpeakStaff);
      if (autoSpeakStaff && pendingStaffSpeak) {
        speakKo(pendingStaffSpeak, 0.88, { silent: true });
        pendingStaffSpeak = null;
      } else if (!autoSpeakStaff) {
        pendingStaffSpeak = null;
      }
    });
    function sendSelectedReply(advanceDelayMs = 0) {
      const feedback = document.getElementById('dialogueFeedback');
      if (roundCommitted) return;
      if (!selectedResponse) {
        feedback.textContent = '先選一句回應。';
        feedback.classList.add('show');
        return;
      }
      if (!selectedResponse.good) {
        feedback.textContent = selectedResponse.feedback;
        feedback.classList.add('show');
        missesByRound[roundIndex] += 1;
        if (missesByRound[roundIndex] >= 2) setHints(true);
        if (missesByRound[roundIndex] >= 3) setTranslations(true);
        return;
      }
      feedback.textContent = '';
      feedback.classList.remove('show');
      const round = rounds[roundIndex];
      roundCommitted = true;
      Array.from(document.getElementById('responseHand').children).forEach((button) => { button.disabled = true; });
      transcript.push({ round: roundIndex, kind: 'learner', role: learnerLabel(), ko: selectedResponse.text, zh: selectedResponse.zh, speak: selectedResponse.speak || selectedResponse.text });
      if (round.closing) transcript.push({ round: roundIndex, kind: 'staff', role: npcLabel(), ko: round.closing.ko, zh: round.closing.zh, speak: round.closing.speak });
      renderTranscript();
      if (roundIndex < rounds.length - 1) {
        roundIndex += 1;
        window.setTimeout(renderDialogueRound, 650 + advanceDelayMs);
      } else {
        dialogueComplete = true;
        feedback.textContent = '';
        feedback.classList.remove('show');
        friendText.textContent = '按整理看今天用到的句子。';
        const hand = document.getElementById('responseHand');
        hand.innerHTML = '';
        hand.classList.add('is-hidden');
        updateNextButton();
      }
    }
    document.getElementById('restart').addEventListener('click', () => { resetDialogue(); show(0); });
    function renderWrap() {
      const list = document.getElementById('wrapList');
      const wrapTitle = document.getElementById('wrapTitle');
      if (!list || !scenarioPack) return;
      wrapTitle.textContent = scenarioPack.wrap_title || '今天這段對話';
      screens[1].dataset.friend = scenarioPack.wrap_friend || '你剛剛走完一段對話。';
      const seen = new Set();
      const items = [];
      const addItem = (surface, translation, label) => {
        if (!surface || seen.has(surface)) return;
        seen.add(surface);
        items.push({ surface, translation, label });
      };
      scenarioPack.turns.forEach((turn) => {
        if (turn.learning_role === 'listen_only') addItem(turn.surface, turn.translation, '聽得懂就好');
        const correctId = turn.reply_set && turn.reply_set.correct;
        const correctChoice = turn.reply_set && turn.reply_set.choices ? turn.reply_set.choices.find((choice) => choice.id === correctId) : null;
        if (correctChoice && correctChoice.learning_role === 'production_target') {
          addItem(correctChoice.surface, correctChoice.translation, '你會說了');
        }
        if (turn.closing && turn.closing.learning_role === 'listen_only') {
          addItem(turn.closing.surface, turn.closing.translation, '聽得懂就好');
        }
      });
      list.innerHTML = items.map((item) => `<div class="wrap-item"><b>${item.surface}</b><div class="meta">${item.label} · ${item.translation}</div></div>`).join('');
    }
    function renderScenarioTabs() {
      const tabs = document.getElementById('scenarioTabs');
      if (!tabs || !scenarioManifest) return;
      tabs.innerHTML = scenarioManifest.scenarios.map((scenario) => `<button class="scenario-tab${scenario.scenario_id === currentScenarioId ? ' active' : ''}" type="button" data-scenario-id="${scenario.scenario_id}">${scenario.label}</button>`).join('');
    }
    async function loadScenario(entry) {
      const response = await fetch(entry.path, { cache: 'no-store' });
      if (!response.ok) throw new Error(`scenario pack load failed: ${response.status}`);
      scenarioPack = await response.json();
      currentScenarioId = scenarioPack.scenario_id;
      rounds = buildRounds(scenarioPack);
      missesByRound = Array(rounds.length).fill(0);
      document.getElementById('settingLabel').textContent = scenarioPack.setting_label || entry.label;
      document.querySelector('section[data-title="櫃台對話"]').dataset.friend = scenarioPack.support_text || supportText();
      title.textContent = scenarioPack.title || entry.label;
      renderScenarioTabs();
      renderWrap();
      resetDialogue();
      show(0);
    }
    document.getElementById('scenarioTabs').addEventListener('click', async (event) => {
      const button = event.target.closest('.scenario-tab');
      if (!button || !scenarioManifest) return;
      const entry = scenarioManifest.scenarios.find((scenario) => scenario.scenario_id === button.dataset.scenarioId);
      if (!entry || entry.scenario_id === currentScenarioId) return;
      try {
        await loadScenario(entry);
      } catch (error) {
        friendText.textContent = '這份練習資料載入失敗，先重新整理看看。';
        document.getElementById('dialogueFeedback').textContent = error.message;
        document.getElementById('dialogueFeedback').classList.add('show');
      }
    });
    async function init() {
      try {
        const manifestResponse = await fetch('scenario_manifest.v1.json', { cache: 'no-store' });
        if (!manifestResponse.ok) throw new Error(`scenario manifest load failed: ${manifestResponse.status}`);
        scenarioManifest = await manifestResponse.json();
        const requestedId = new URLSearchParams(window.location.search).get('scenario') || scenarioManifest.default_scenario_id;
        const entry = scenarioManifest.scenarios.find((scenario) => scenario.scenario_id === requestedId) || scenarioManifest.scenarios[0];
        await loadScenario(entry);
      } catch (error) {
        friendText.textContent = '這份練習資料載入失敗，先重新整理看看。';
        const hand = document.getElementById('responseHand');
        hand.innerHTML = '';
        hand.classList.add('is-hidden');
        document.getElementById('dialogueFeedback').textContent = error.message;
        document.getElementById('dialogueFeedback').classList.add('show');
        nextBtn.disabled = true;
      }
    }
    init();
  </script>
</body>
</html>
